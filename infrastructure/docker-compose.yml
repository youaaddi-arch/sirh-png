version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sirh_postgres
    environment:
      POSTGRES_USER: sirh
      POSTGRES_PASSWORD: sirh_dev_pwd
      POSTGRES_DB: sirh_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sirh -d sirh_dev"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sirh_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: sirh_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sirh
      MINIO_ROOT_PASSWORD: sirh_dev_pwd
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: sirh_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sirh sirh_dev_pwd;
      mc mb -p local/sirh-documents || true;
      mc mb -p local/sirh-contracts || true;
      mc mb -p local/sirh-payslips || true;
      mc mb -p local/sirh-preboarding || true;
      mc anonymous set download local/sirh-documents || true;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog
    container_name: sirh_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
