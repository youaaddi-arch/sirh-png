name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  api:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sirh
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sirh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm install -g pnpm@9.0.0
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @sirh/api prisma:generate
        env:
          DATABASE_URL: postgresql://sirh:test@localhost:5432/sirh_test
      - name: Build API
        run: pnpm --filter @sirh/api build

  web:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm install -g pnpm@9.0.0
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Generate Prisma client (needed by shared types)
        run: pnpm --filter @sirh/api prisma:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      - name: Build Web
        run: pnpm --filter @sirh/web build
