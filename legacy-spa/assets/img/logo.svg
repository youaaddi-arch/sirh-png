<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <!-- 4-branch compass star on left -->
  <g transform="translate(75, 75)">
    <!-- Top branch (gold) -->
    <polygon points="0,-58 12,-12 0,0" fill="#c9a04f"/>
    <!-- Right branch (gold) -->
    <polygon points="58,0 12,12 0,0" fill="#c9a04f"/>
    <polygon points="58,0 12,-12 0,0" fill="#c9a04f"/>
    <!-- Bottom branch (navy) -->
    <polygon points="0,58 -12,12 0,0" fill="#1e2f7e"/>
    <polygon points="0,58 12,12 0,0" fill="#1e2f7e"/>
    <!-- Left branch (navy) -->
    <polygon points="-58,0 -12,-12 0,0" fill="#1e2f7e"/>
    <polygon points="-58,0 -12,12 0,0" fill="#1e2f7e"/>
    <!-- Top-left (navy) -->
    <polygon points="0,-58 -12,-12 0,0" fill="#1e2f7e"/>
  </g>
  <!-- PaNo text -->
  <text x="160" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#0f1f4d" letter-spacing="-1">PaNo</text>
  <!-- by PARIS NORD GROUPE -->
  <text x="160" y="115" font-family="Georgia, serif" font-size="14" fill="#1e2f7e" letter-spacing="2">by PARIS NORD GROUPE</text>
  <!-- Gold underline -->
  <line x1="160" y1="125" x2="395" y2="125" stroke="#c9a04f" stroke-width="1.5"/>
</svg>
